<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <defs>
          <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" style="stop-color:#0d1f3c;stop-opacity:1"/>
                  <stop offset="100%" style="stop-color:#050d1a;stop-opacity:1"/>
          </radialGradient>
          <radialGradient id="faceGrad" cx="50%" cy="40%" r="55%">
                  <stop offset="0%" style="stop-color:#c8956c"/>
                  <stop offset="100%" style="stop-color:#8b5e3c"/>
          </radialGradient>
          <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
                  <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
          </radialGradient>
          <filter id="glow">
                  <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                  <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="softGlow">
                  <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
                  <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="circleClip">
                  <circle cx="200" cy="200" r="190"/>
          </clipPath>
          <style>
                  @keyframes pulse {
                    0%, 100% { opacity: 0.4; }
                    50% { opacity: 1; }
                  }
                  @keyframes rotate {
                    from { transform: rotate(0deg); transform-origin: 200px 200px; }
                    to { transform: rotate(360deg); transform-origin: 200px 200px; }
                  }
                  @keyframes blink {
                    0%, 90%, 100% { opacity: 1; }
                    95% { opacity: 0; }
                  }
                  @keyframes float {
                    0%, 100% { transform: translateY(0px); }
                    50% { transform: translateY(-4px); }
                  }
                  @keyframes scanline {
                    0% { transform: translateY(-10px); opacity: 0; }
                    10% { opacity: 0.6; }
                    90% { opacity: 0.6; }
                    100% { transform: translateY(320px); opacity: 0; }
                  }
                  @keyframes dash {
                    to { stroke-dashoffset: -20; }
                  }
                  .orbit { animation: rotate 8s linear infinite; }
                  .orbit2 { animation: rotate 12s linear infinite reverse; }
                  .pulse1 { animation: pulse 2s ease-in-out infinite; }
                  .pulse2 { animation: pulse 2.5s ease-in-out infinite 0.5s; }
                  .pulse3 { animation: pulse 3s ease-in-out infinite 1s; }
                  .blink { animation: blink 4s ease-in-out infinite; }
                  .float { animation: float 3s ease-in-out infinite; }
                  .scan { animation: scanline 4s linear infinite; }
                  .circuit-dash { animation: dash 1s linear infinite; }
          </style>
    </defs>

    <!-- Background circle -->
    <circle cx="200" cy="200" r="198" fill="url(#bgGrad)" stroke="#00d4ff" stroke-width="2"/>

    <!-- Outer ring decoration -->
    <circle cx="200" cy="200" r="185" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,8" opacity="0.4" class="orbit"/>
    <circle cx="200" cy="200" r="170" fill="none" stroke="#00bfff" stroke-width="0.3" stroke-dasharray="2,6" opacity="0.3" class="orbit2"/>

    <!-- Circuit board lines background -->
    <g opacity="0.15" stroke="#00d4ff" stroke-width="1" fill="none" clip-path="url(#circleClip)">
          <line x1="50" y1="80" x2="160" y2="80"/>
          <line x1="160" y1="80" x2="160" y2="100"/>
          <circle cx="160" cy="100" r="3" fill="#00d4ff"/>
          <line x1="240" y1="80" x2="350" y2="80"/>
          <line x1="240" y1="80" x2="240" y2="100"/>
          <circle cx="240" cy="100" r="3" fill="#00d4ff"/>
          <line x1="60" y1="320" x2="150" y2="320"/>
          <line x1="150" y1="300" x2="150" y2="320"/>
          <circle cx="150" cy="300" r="3" fill="#00d4ff"/>
          <line x1="250" y1="320" x2="340" y2="320"/>
          <line x1="250" y1="300" x2="250" y2="320"/>
          <circle cx="250" cy="300" r="3" fill="#00d4ff"/>
          <line x1="60" y1="200" x2="90" y2="200"/>
          <line x1="310" y1="200" x2="340" y2="200"/>
    </g>

    <!-- Scanning line effect -->
    <rect x="10" y="10" width="380" height="3" fill="url(#glowBlue)" class="scan" clip-path="url(#circleClip)"/>

    <!-- HUD corner brackets -->
    <g stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.7" filter="url(#glow)">
          <!-- Top-left -->
          <path d="M 45 65 L 45 45 L 65 45"/>
          <!-- Top-right -->
          <path d="M 335 45 L 355 45 L 355 65"/>
          <!-- Bottom-left -->
          <path d="M 45 335 L 45 355 L 65 355"/>
          <!-- Bottom-right -->
          <path d="M 355 335 L 355 355 L 335 355"/>
    </g>

    <!-- Orbiting dots -->
    <g class="orbit">
          <circle cx="200" cy="15" r="4" fill="#00d4ff" filter="url(#glow)" class="pulse1"/>
          <circle cx="200" cy="385" r="3" fill="#00bfff" opacity="0.6"/>
          <circle cx="15" cy="200" r="3" fill="#00bfff" opacity="0.6"/>
          <circle cx="385" cy="200" r="4" fill="#00d4ff" filter="url(#glow)" class="pulse2"/>
    </g>

    <!-- Body / shirt -->
    <ellipse cx="200" cy="340" rx="95" ry="70" fill="#1a3a5c" clip-path="url(#circleClip)"/>
    <ellipse cx="200" cy="355" rx="80" ry="60" fill="#0f2540" clip-path="url(#circleClip)"/>

    <!-- Shirt collar detail -->
    <path d="M 170 295 L 200 320 L 230 295" fill="none" stroke="#2a5a8c" stroke-width="2" clip-path="url(#circleClip)"/>

    <!-- Neck -->
    <rect x="183" y="258" width="34" height="40" rx="10" fill="#b8834e" clip-path="url(#circleClip)"/>

    <!-- Head -->
    <ellipse cx="200" cy="215" rx="72" ry="78" fill="url(#faceGrad)" class="float"/>

    <!-- Hair -->
    <ellipse cx="200" cy="148" rx="72" ry="30" fill="#1a0a00"/>
    <path d="M 128 170 Q 128 148 145 148 Q 135 170 138 185" fill="#1a0a00"/>
    <path d="M 272 170 Q 272 148 255 148 Q 265 170 262 185" fill="#1a0a00"/>
    <!-- Hair top detail -->
    <path d="M 148 150 Q 170 138 200 136 Q 230 138 252 150 Q 230 145 200 143 Q 170 145 148 150" fill="#2a1500" opacity="0.5"/>

    <!-- Ears -->
    <ellipse cx="128" cy="218" rx="12" ry="16" fill="#b0773f"/>
    <ellipse cx="272" cy="218" rx="12" ry="16" fill="#b0773f"/>

    <!-- Eyes -->
    <g class="blink">
          <!-- Left eye -->
          <ellipse cx="178" cy="208" rx="13" ry="14" fill="#fff"/>
          <ellipse cx="180" cy="210" rx="9" ry="10" fill="#3d2000"/>
          <ellipse cx="182" cy="208" rx="6" ry="7" fill="#1a0a00"/>
          <circle cx="185" cy="205" r="2.5" fill="white"/>
          <!-- Right eye -->
          <ellipse cx="222" cy="208" rx="13" ry="14" fill="#fff"/>
          <ellipse cx="224" cy="210" rx="9" ry="10" fill="#3d2000"/>
          <ellipse cx="222" cy="208" rx="6" ry="7" fill="#1a0a00"/>
          <circle cx="225" cy="205" r="2.5" fill="white"/>
    </g>

    <!-- Eyebrows -->
    <path d="M 165 193 Q 178 188 191 192" stroke="#1a0a00" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 209 192 Q 222 188 235 193" stroke="#1a0a00" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M 200 215 Q 193 228 195 234 Q 200 237 205 234 Q 207 228 200 215" fill="#a06535" opacity="0.6"/>

    <!-- Mouth - slight smile -->
    <path d="M 184 248 Q 200 258 216 248" stroke="#7a4020" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Glasses frames - tech look -->
    <g stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.85" filter="url(#glow)">
          <rect x="163" y="200" width="32" height="22" rx="5" fill="#00d4ff" fill-opacity="0.08"/>
          <rect x="205" y="200" width="32" height="22" rx="5" fill="#00d4ff" fill-opacity="0.08"/>
          <line x1="195" y1="211" x2="205" y2="211"/>
          <line x1="131" y1="211" x2="163" y2="211"/>
          <line x1="237" y1="211" x2="269" y2="211"/>
    </g>

    <!-- Tech collar / badge -->
    <g clip-path="url(#circleClip)">
          <rect x="170" y="290" width="60" height="28" rx="5" fill="#0a1f3a" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
          <text x="200" y="308" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d4ff" opacity="0.9">INDUSTRY 4.0</text>
    </g>

    <!-- Floating tech icons around avatar -->
    <!-- ROS2 icon hint - top left -->
    <g transform="translate(58,118)" filter="url(#glow)" class="pulse1">
          <circle r="16" fill="#0d1f3c" stroke="#00d4ff" stroke-width="1.5"/>
          <text text-anchor="middle" dy="4" font-family="monospace" font-size="8" fill="#00d4ff">ROS2</text>
    </g>

    <!-- AI icon - top right -->
    <g transform="translate(342,118)" filter="url(#glow)" class="pulse2">
          <circle r="16" fill="#0d1f3c" stroke="#7c3aed" stroke-width="1.5"/>
          <text text-anchor="middle" dy="4" font-family="monospace" font-size="9" fill="#a855f7">AI</text>
    </g>

    <!-- IIoT - bottom left -->
    <g transform="translate(68,290)" filter="url(#glow)" class="pulse3">
          <circle r="16" fill="#0d1f3c" stroke="#10b981" stroke-width="1.5"/>
          <text text-anchor="middle" dy="4" font-family="monospace" font-size="7" fill="#10b981">IIoT</text>
    </g>

    <!-- n8n - bottom right -->
    <g transform="translate(332,290)" filter="url(#glow)" class="pulse1">
          <circle r="16" fill="#0d1f3c" stroke="#f59e0b" stroke-width="1.5"/>
          <text text-anchor="middle" dy="4" font-family="monospace" font-size="9" fill="#f59e0b">n8n</text>
    </g>

    <!-- Name tag at bottom -->
    <g filter="url(#softGlow)">
          <rect x="80" y="358" width="240" height="26" rx="6" fill="#0d1f3c" stroke="#00d4ff" stroke-width="1.5" opacity="0.95"/>
          <text x="200" y="375" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00d4ff" font-weight="bold" letter-spacing="1">DHANUSH RAMESH BABU</text>
    </g>

    <!-- Status indicator -->
    <circle cx="330" cy="362" r="5" fill="#10b981" filter="url(#glow)" class="pulse2"/>
    <text x="320" y="385" text-anchor="middle" font-family="monospace" font-size="7" fill="#10b981">ACTIVE</text>

    <!-- Outer border final -->
    <circle cx="200" cy="200" r="197" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
</svg>
